# Сервисы приложения (заглушки). API: порт 8000 на хосте.
# Запускать после infra: хост leads-db в docker-сети propradar.

services:
  parsers:
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://leads:changeme@leads-db:5432/leads}
      APP_ENV: ${APP_ENV:-development}
    command: ["sleep", "infinity"]
    networks:
      - propradar

  api:
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://leads:changeme@leads-db:5432/leads}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    networks:
      - propradar

networks:
  propradar:
    external: true
