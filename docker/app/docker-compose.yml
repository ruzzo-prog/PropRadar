# Сервисы приложения (заглушки). API: контейнер слушает 8000; с хоста — 8000:8000.
# Локальный uvicorn на хосте (вне compose): порт 9000, см. README и .env.example.local.
# Запускать после infra: хост leads-db в docker-сети propradar.
#
# API + БД (чтобы сработал depends_on на leads-db):
#   docker compose -f ../infra/docker-compose.yml -f docker-compose.yml up -d api
# Только этот файл без infra: сервис leads-db не определён — compose выдаст ошибку.
#
# Первая compose-файл задаёт project directory (docker/infra), поэтому интерполяция ${VAR}
# в YAML не читает docker/app/.env — секреты для api задаём через env_file относительно
# этого файла (docker/app/.env попадает в контейнер напрямую).

services:
  parsers:
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://leads:changeme@leads-db:5432/leads}
      APP_ENV: ${APP_ENV:-development}
    command: ["sleep", "infinity"]
    networks:
      - propradar

  api:
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    working_dir: /srv
    env_file:
      - .env
    environment:
      PYTHONPATH: /srv/src
      PROPRADAR_REPO_ROOT: /srv
    ports:
      - "8000:8000"
    volumes:
      - ../../:/srv:ro
    depends_on:
      leads-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    networks:
      - propradar

networks:
  propradar:
    external: true
