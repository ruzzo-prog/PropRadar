# Сервисы приложения. API: контейнер слушает 8000; с хоста — 8000:8000.
# Рекомендуемый запуск из корня репозитория: см. ../../compose.yaml и --profile app (+ infra).
# DATABASE_URL и прочие секреты — из корневого .env (env_file ../../.env относительно этого файла).
#
# Устаревший вариант merge из каталога docker/app (порядок файлов важен для project directory):
#   docker compose -f docker-compose.yml -f ../infra/docker-compose.yml up -d api

services:
  parsers:
    profiles:
      - app
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://leads:changeme@leads-db:5432/leads}
      APP_ENV: ${APP_ENV:-development}
    command: ["sleep", "infinity"]
    networks:
      - propradar

  api:
    profiles:
      - app
    build:
      context: ../..
      dockerfile: docker/app/parsers.Dockerfile
    working_dir: /srv
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /srv/src
      PROPRADAR_REPO_ROOT: /srv
    ports:
      - "8000:8000"
    volumes:
      - ../../:/srv:ro
    depends_on:
      leads-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    networks:
      - propradar

networks:
  propradar:
    external: true
