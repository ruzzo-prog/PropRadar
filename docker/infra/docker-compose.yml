# PostgreSQL 15 — leads-db. Порт на хосте: 5433.
# Перед запуском:  docker network create propradar

services:
  leads-db:
    image: postgres:15-alpine
    container_name: propradar-leads-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-leads}
    ports:
      - "5433:5432"
    volumes:
      - leads_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - propradar

volumes:
  leads_db_data:

networks:
  propradar:
    external: true
