# PostgreSQL 15 — leads-db. Порт на хосте: 5433.
# Перед запуском:  docker network create propradar
#
# Профиль infra: этот сервис не стартует без --profile infra
# (единый вход из корня репозитория: compose.yaml).

services:
  leads-db:
    profiles:
      - infra
    image: postgres:15-alpine
    container_name: propradar-leads-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-leads}
    ports:
      - "5433:5432"
    volumes:
      - leads_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - propradar

  # Redis: кэш/очереди (Evolution API и др.). Порт не публикуется — только сеть propradar.
  propradar-redis:
    profiles:
      - infra
    image: redis:7.4.9-alpine
    container_name: propradar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - propradar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - propradar

volumes:
  leads_db_data:
  propradar_redis_data:

networks:
  propradar:
    external: true
