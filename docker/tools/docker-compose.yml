# n8n, Metabase (хост 3031 → контейнер 3000), Evolution API.
# Требуется сеть:  docker network create propradar

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      N8N_EDITOR_BASE_URL: "${N8N_EDITOR_BASE_URL:-}"
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - propradar

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_SITE_NAME: ${MB_SITE_NAME:-PropRadar}
      JAVA_TIMEZONE: ${JAVA_TIMEZONE:-UTC}
      TZ: ${TZ:-UTC}
    ports:
      - "3031:3000"
    volumes:
      - metabase_data:/metabase-data
    networks:
      - propradar

  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:-change-me}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI:-postgresql://leads:changeme@leads-db:5432/leads?schema=evolution_api}
      DATABASE_CONNECTION_CLIENT_NAME: ${DATABASE_CONNECTION_CLIENT_NAME:-prop-radar-evolution}
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - propradar

volumes:
  n8n_data:
  metabase_data:
  evolution_instances:

networks:
  propradar:
    external: true
