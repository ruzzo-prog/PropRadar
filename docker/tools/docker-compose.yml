# n8n, Metabase (хост 3031 → контейнер 3000), Evolution API.
# Требуется сеть:  docker network create propradar
# Запуск из корня репозитория: docker compose --profile tools up -d (см. compose.yaml).

services:
  n8n:
    profiles:
      - tools
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      N8N_EDITOR_BASE_URL: "${N8N_EDITOR_BASE_URL:-}"
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - propradar

  metabase:
    profiles:
      - tools
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_SITE_NAME: ${MB_SITE_NAME:-PropRadar}
      JAVA_TIMEZONE: ${JAVA_TIMEZONE:-UTC}
      TZ: ${TZ:-UTC}
    ports:
      - "3031:3000"
    volumes:
      - metabase_data:/metabase-data
    networks:
      - propradar

  evolution-api:
    profiles:
      - tools
    image: atendai/evolution-api:latest
    restart: unless-stopped
    # Redis (propradar-redis) в docker/infra — без cross-profile depends_on.
    # CACHE_REDIS_ENABLED=true: pre-start ожидание TCP по CACHE_REDIS_URI (таймаут — non-zero exit).
    # Дефолт tools-only: Redis выключен.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        if [ "$${CACHE_REDIS_ENABLED:-false}" = "true" ]; then
          uri="$${CACHE_REDIS_URI:-redis://127.0.0.1:6379}"
          if [[ ! "$$uri" =~ ^redis://([^:/@]+)(:([0-9]+))?(/.*)?$$ ]]; then
            echo "Invalid CACHE_REDIS_URI: $$uri"
            exit 1
          fi
          host="$${BASH_REMATCH[1]}"
          port="$${BASH_REMATCH[3]:-6379}"
          echo "Waiting for Redis at $$host:$$port (CACHE_REDIS_ENABLED=true)..."
          deadline=$$(( $$(date +%s) + 120 ))
          ok=0
          while [ $$(date +%s) -le $$deadline ]; do
            if { echo > /dev/tcp/$$host/$$port; } >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$$ok" != "1" ]; then
            echo "Redis wait timeout ($$host:$$port)"
            exit 1
          fi
          echo "Redis is reachable."
        fi
        npm run db:deploy && npm run db:generate && npm run start:prod
    environment:
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:-change-me}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI:-postgresql://leads:changeme@leads-db:5432/leads?schema=evolution_api}
      DATABASE_CONNECTION_CLIENT_NAME: ${DATABASE_CONNECTION_CLIENT_NAME:-prop-radar-evolution}
      CACHE_REDIS_ENABLED: ${CACHE_REDIS_ENABLED:-false}
      CACHE_REDIS_URI: ${CACHE_REDIS_URI:-redis://propradar-redis:6379}
      CACHE_REDIS_PREFIX_KEY: ${CACHE_REDIS_PREFIX_KEY:-propradar-evolution}
      CACHE_LOCAL_ENABLED: ${CACHE_LOCAL_ENABLED:-false}
      CACHE_REDIS_SAVE_INSTANCES: ${CACHE_REDIS_SAVE_INSTANCES:-false}
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - propradar

volumes:
  n8n_data:
  metabase_data:
  evolution_instances:

networks:
  propradar:
    external: true
