# FQDN и TLS: Let's Encrypt (см. README.md в docker/reverse-proxy).

upstream metabase_app {
    server metabase:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name metabase.usluga-market.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name metabase.usluga-market.ru;

    ssl_certificate /etc/nginx/certs/metabase/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/metabase/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    location / {
        proxy_pass http://metabase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
