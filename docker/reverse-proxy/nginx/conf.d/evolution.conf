# FQDN и TLS: Let's Encrypt; SERVER_URL в Evolution — https://evolution.usluga-market.ru

upstream evolution_app {
    server evolution-api:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name evolution.usluga-market.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name evolution.usluga-market.ru;

    ssl_certificate /etc/letsencrypt/live/evolution.usluga-market.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evolution.usluga-market.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    location / {
        proxy_pass http://evolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
