# Nginx reverse-proxy + TLS для n8n и Evolution API (сеть propradar).
# TLS: 4 file bind-mount с хоста (fullchain/privkey для N8N и Evolution) — см. README.
# Внутри контейнера пути фиксированы: /etc/nginx/certs/{n8n,evolution}/...
# Предварительно: docker network create propradar
# Поднять вместе с docker/tools и (при необходимости) docker/app, docker/infra.
#
# API (FastAPI) по умолчанию не публикуется через этот прокси — только внутренняя
# сеть Docker (http://api:8000). См. README.md в этой папке.

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: propradar-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Preflight вызывается явно через sh в command — не зависит от executable bit
    # (на Windows при core.fileMode=false скрипты в /docker-entrypoint.d могут не запускаться).
    command:
      - sh
      - -c
      - |
        set -eu
        sh /docker-entrypoint.d/00-tls-preflight.sh
        exec nginx -g 'daemon off;'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/docker-entrypoint.d/00-tls-preflight.sh:/docker-entrypoint.d/00-tls-preflight.sh:ro
      - ${N8N_TLS_FULLCHAIN:-./letsencrypt/live/n8n.usluga-market.ru/fullchain.pem}:/etc/nginx/certs/n8n/fullchain.pem:ro
      - ${N8N_TLS_PRIVKEY:-./letsencrypt/live/n8n.usluga-market.ru/privkey.pem}:/etc/nginx/certs/n8n/privkey.pem:ro
      - ${EVOLUTION_TLS_FULLCHAIN:-./letsencrypt/live/evolution.usluga-market.ru/fullchain.pem}:/etc/nginx/certs/evolution/fullchain.pem:ro
      - ${EVOLUTION_TLS_PRIVKEY:-./letsencrypt/live/evolution.usluga-market.ru/privkey.pem}:/etc/nginx/certs/evolution/privkey.pem:ro
      - reverse_proxy_certbot_www:/var/www/certbot:ro
    networks:
      - propradar

volumes:
  reverse_proxy_certbot_www:

networks:
  propradar:
    external: true
